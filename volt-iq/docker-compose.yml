version: '3.8'

services:
  influxdb:
    image: influxdb:2.7
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=voltiq2026
      - DOCKER_INFLUXDB_INIT_ORG=voltiq
      - DOCKER_INFLUXDB_INIT_BUCKET=energy

  api:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      - influxdb
    environment:
      - INFLUX_URL=http://influxdb:8086
      - INFLUX_TOKEN=voltiq2026

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - api
